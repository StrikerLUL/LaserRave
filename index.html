<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unity Raw 1.7 Simulator (Tiny Desk Raves)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay (Glassmorphism) -->
    <div id="ui-container">
      <header>
        <h1>Tiny Desk Raves</h1>
        <p>Virtual Laser Stage Simulator</p>
      </header>

      <div class="control-panel">
        <label for="audio-upload" class="upload-btn">
          <span>🎵 Load Audio (MP3/WAV)</span>
          <input type="file" id="audio-upload" accept="audio/*">
        </label>
        <div id="track-name">No track loaded</div>
        
        <div class="controls-grid">
          <div class="control-group">
            <label>Master Intensity</label>
            <input type="range" id="param-intensity" min="0.1" max="2" step="0.1" value="1.0">
          </div>
          <div class="control-group">
            <label>Laser Speed</label>
            <input type="range" id="param-speed" min="0.1" max="5" step="0.1" value="1.0">
          </div>
          <div class="control-group">
            <label>Laser Spread (Breite)</label>
            <input type="range" id="param-spread" min="0.1" max="3" step="0.1" value="1.5">
          </div>
          <div class="control-group">
            <label>Beam Thickness (Dicke)</label>
            <input type="range" id="param-thickness" min="0.5" max="5" step="0.1" value="1.0">
          </div>
          <div class="control-group">
            <label>Vertical Tilt (Winkel)</label>
            <input type="range" id="param-tilt" min="-90" max="90" step="1" value="20">
          </div>
          <div class="control-group">
            <label>Color Theme</label>
            <select id="param-theme">
              <option value="rgb">RGB Classic</option>
              <option value="cyberpunk">Cyberpunk (Pink/Cyan)</option>
              <option value="warm">Fire (Red/Yellow)</option>
              <option value="matrix">Matrix (Green)</option>
            </select>
          </div>
        </div>

        <div class="playback-controls">
          <button id="btn-play-pause" disabled>Play</button>
        </div>
        
        <div class="audio-visualizer-container">
            <canvas id="audio-visualizer" width="300" height="60"></canvas>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
